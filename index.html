<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos en VIVO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>
    body {margin:0; background:#000; color:#fff; font-family:Arial,sans-serif;}
    .iframe-container {position:relative; width:100%; padding-top:56.25%; border-radius:10px; overflow:hidden; margin:20px auto;}
    .iframe-container iframe {position:absolute; top:0; left:0; width:100%; height:100%; border:none;}
  </style>
</head>
<body>

  <h3 style="text-align:center;">Eventos - HSPORTSTVHD</h3>

  <div class="iframe-container" id="player"></div>

  <script>
    // Obtener parámetro channel de la URL
    function getParameterByName(name) {
      const url = window.location.href;
      name = name.replace(/[

\[\]

]/g, "\\$&");
      const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
      const results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, " "));
    }

    const channel = getParameterByName("channel") || "daznf1"; // por defecto daznf1

    // Construir la URL real
    const realUrl = "https://streamx10.cloud/global1.php?channel=" + channel;

    // Codificar en Base64 y decodificar (para ocultar la URL en Blogger)
    const b64 = btoa(realUrl);
    const url = atob(b64);

    // Insertar el iframe dinámicamente
    document.getElementById("player").innerHTML =
      '<iframe src="'+url+'" allow="autoplay; encrypted-media" allowfullscreen scrolling="no"></iframe>';
  </script>

</body>
</html>
