<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos en VIVO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>
    body {margin:0; background:#000; color:#fff; font-family:Arial,sans-serif;}
    .iframe-container {position:fixed; width:100%; padding-top:56.25%; border-radius:10px; overflow:hidden; margin:20px auto;}
    .iframe-container iframe {position:absolute; top:0; left:0; width:100%; height:100%; border:none;}
    #overlay {position:absolute; inset:0; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; font-size:24px; z-index:9999;}
    #overlay iframe {width:80%; height:60%; border:none; margin-bottom:20px;}
  </style>
</head>
<body>

  <h3 style="text-align:center;">Eventos - HSPORTSTVHD</h3>

  <div class="iframe-container" id="player">
    <div id="overlay">
      <iframe src="https://annoyingnightmareedit.com/sx8hwavut?key=12d54e488207e905a50e1b60079637db"></iframe>
      <p>Espere <span id="countdown">15</span> segundos...</p>
    </div>
  </div>

  <script>
    // Obtener parámetro channel de la URL
    function getParameterByName(name) {
      const url = window.location.href;
      name = name.replace(/[

\[\]

]/g, "\\$&");
      const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
      const results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, " "));
    }

    const channel = getParameterByName("channel") || "daznf1"; // por defecto daznf1

    // Construir la URL real
    const realUrl = "https://streamx10.cloud/global1.php?channel=" + channel;

    // Codificar en Base64
    const b64 = btoa(realUrl);

    // Decodificar para insertar
    const url = atob(b64);

    // Overlay con contador
    let seconds = 15;
    const countdown = document.getElementById("countdown");
    const overlay = document.getElementById("overlay");
    const player = document.getElementById("player");

    const timer = setInterval(() => {
      seconds--;
      countdown.textContent = seconds;
      if(seconds <= 0){
        clearInterval(timer);
        overlay.style.display = "none";
        // Inserta el iframe del canal dinámicamente
        player.innerHTML = '<iframe src="'+url+'" allow="autoplay; encrypted-media" allowfullscreen scrolling="no"></iframe>';
      }
    }, 1000);
  </script>

</body>
</html>
