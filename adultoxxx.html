<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Canales</title>
  <script src="https://cdn.jsdelivr.net/npm/jwplayer@latest/jwplayer.js"></script>
  <style>
    body {
      margin:0;
      background:#000;
      color:#fff;
      font-family:Arial,sans-serif;
      display:flex;
      flex-direction:column;
      height:100vh;
    }
    #player {
      flex:1;
      width:100%;
    }
    .menu {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap:10px;
      padding:10px;
      background:#111;
      overflow-y:auto;
      max-height:35vh; /* lista ocupa parte inferior */
    }
    .canal {
      display:flex;
      align-items:center;
      gap:10px;
      background:#0b90c5;
      color:#fff;
      padding:10px;
      border-radius:6px;
      cursor:pointer;
    }
    .canal img {
      width:48px;
      height:48px;
      border-radius:4px;
    }
    .canal span {
      flex:1;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div id="player"></div>
  <div class="menu" id="menu"></div>

  <script>
    // Inicializa JW Player vacío
    jwplayer("player").setup({
      file: "",
      width: "100%",
      height: "100%",
      autostart: false,
      stretching: "uniform" // evita márgenes negros
    });

    // Cargar lista de canales desde tu JSON en GitHub
    fetch("https://hernanmix.github.io/play.github.io/adulto.json")
      .then(response => {
        if (!response.ok) throw new Error("No se pudo cargar el JSON");
        return response.json();
      })
      .then(data => {
        const menu = document.getElementById("menu");
        data.forEach(canal => {
          const btn = document.createElement("div");
          btn.className = "canal";
          btn.innerHTML = `<img src="${canal.logo}" alt=""><span>${canal.nombre} (${canal.grupo})</span>`;
          btn.onclick = () => {
            jwplayer("player").load([{ file: canal.url }]);
            jwplayer("player").play();
          };
          menu.appendChild(btn);
        });
        // Cargar el primer canal automáticamente
        if (data.length > 0) {
          jwplayer("player").load([{ file: data[0].url }]);
          jwplayer("player").play();
        }
      })
      .catch(err => console.error("Error cargando JSON:", err));
  </script>

</body>
</html>
