<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adulto</title>
  <script src="https://cdn.jsdelivr.net/npm/jwplayer@latest/jwplayer.js"></script>
  <style>
    body {
      margin:0;
      background:#000;
      color:#fff;
      font-family:Arial,sans-serif;
      display:flex;
      flex-direction:column;
      height:100vh;
    }
    h1 {
      text-align:center;
      color:#fff;
      margin:10px 0;
    }
    #player {
      flex:1;
      width:100%;
    }
    .menu {
      display:grid;
      gap:10px;
      padding:10px;
      background:#111;
      overflow-y:auto;
      max-height:40vh;
    }
    .canal {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:#0b90c5;
      color:#fff;
      padding:15px;
      border-radius:6px;
      cursor:pointer;
      text-align:center;
    }
    .canal img {
      width:80px;
      height:80px;
      border-radius:6px;
      margin-bottom:8px;
    }
    .canal span {
      font-size:14px;
      font-weight:bold;
    }
    /* Responsivo: 3 columnas en móvil, 4 en escritorio */
    @media (max-width:768px) {
      .menu { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width:769px) {
      .menu { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <h1>Adulto</h1>
  <div id="player"></div>
  <div class="menu" id="menu"></div>

  <script>
    jwplayer("player").setup({
      file: "",
      width: "100%",
      height: "100%",
      autostart: false,
      stretching: "uniform"
    });

    fetch("https://hernanmix.github.io/play.github.io/adulto.json")
      .then(response => response.json())
      .then(data => {
        const menu = document.getElementById("menu");
        data.forEach(canal => {
          const btn = document.createElement("div");
          btn.className = "canal";
          btn.innerHTML = `<img src="${canal.logo}" alt=""><span>${canal.nombre}</span>`;
          btn.onclick = () => {
            jwplayer("player").load([{ file: canal.url }]);
            jwplayer("player").play();
          };
          menu.appendChild(btn);
        });
        if (data.length > 0) {
          jwplayer("player").load([{ file: data[0].url }]);
          jwplayer("player").play();
        }
      })
      .catch(err => console.error("Error cargando JSON:", err));
  </script>

</body>
</html>
