<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor TV</title>
  <script src="https://cdn.jsdelivr.net/npm/jwplayer@latest/jwplayer.js"></script>
  <style>
    body {background:#000; color:#fff; font-family:Arial,sans-serif;}
    #player {width:100%; height:480px; margin:20px auto;}
    .menu {display:flex; flex-wrap:wrap; gap:10px; justify-content:center;}
    .menu button {padding:10px 20px; border:none; border-radius:6px; cursor:pointer; background:#0b90c5; color:#fff;}
  </style>
</head>
<body>

  <h2 style="text-align:center;">Mi Reproductor TV</h2>

  <div id="player"></div>
  <div class="menu" id="menu"></div>

  <script>
    jwplayer("player").setup({
      file: "",
      width: "100%",
      height: "100%",
      autostart: false
    });

    fetch("canales.json")
      .then(response => response.json())
      .then(data => {
        const menu = document.getElementById("menu");
        data.forEach(canal => {
          const btn = document.createElement("button");
          btn.textContent = canal.nombre;
          btn.onclick = () => {
            jwplayer("player").load([{ file: canal.url }]);
            jwplayer("player").play();
          };
          menu.appendChild(btn);
        });
        // Cargar el primer canal automáticamente
        if (data.length > 0) {
          jwplayer("player").load([{ file: data[0].url }]);
        }
      });
  </script>

</body>
</html>
